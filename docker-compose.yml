services:
  api:
    build: .
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://ai_intake:ai_intake_password@postgres:5432/ai_intake_core
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ai_intake
      POSTGRES_PASSWORD: ai_intake_password
      POSTGRES_DB: ai_intake_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_intake -d ai_intake_core"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
